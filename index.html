<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Image Viewer</title>
    <style>
        /* CSS tối ưu cho Mobile */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Nền đen */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

       #gallery {
            width: 100%;
            padding: 15px 10px; 
            box-sizing: border-box;
            /* Căn giữa toàn bộ nội dung bên trong gallery */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-container {
            width: 100%;
            margin-bottom: 15px;
            min-height: 200px;
            /* Đảm bảo container cũng căn giữa */
            display: flex;
            justify-content: center;
        }

        img {
            width: 100%; /* Chiếm hết chiều ngang mobile */
            max-width: 100%; 
            height: auto;
            display: block;
            margin: 0 auto; /* Căn giữa ảnh */
            border-radius: 12px;
            object-fit: contain; /* Giữ nguyên tỷ lệ ảnh không bị cắt */
        }

        /* Loading indicator */
        #loader {
            color: #fff;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="gallery"></div>
    <div id="loader">Đang tải thêm...</div>

    <script>
        const CHUNK_SIZE = 20;
        const MAX_CHUNKS_IN_DOM = 3;
        
        let allUrls = [];
        let loadedChunks = []; // Lưu trữ reference của các div chunk
        let currentChunkIndex = 0;
        let totalChunksToLoad = 0;

        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');

        // 1. Load data.json và xáo trộn lấy 2000 ảnh
        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Trộn ngẫu nhiên và lấy 2000
                allUrls = data.sort(() => 0.5 - Math.random()).slice(0, 2000);
                totalChunksToLoad = Math.ceil(allUrls.length / CHUNK_SIZE);

                // Load 2 chunk đầu tiên để bắt đầu
                loadNextChunk();
                loadNextChunk();

                // Lắng nghe sự kiện cuộn
                window.addEventListener('scroll', handleScroll);
            } catch (err) {
                console.error("Lỗi load dữ liệu:", err);
                loader.innerText = "Không thể tải dữ liệu.";
            }
        }

        // 2. Hàm tạo và chèn một chunk ảnh
        function loadNextChunk() {
            if (currentChunkIndex >= totalChunksToLoad) {
                loader.innerText = "Đã hết ảnh.";
                return;
            }

            const chunkDiv = document.createElement('div');
            chunkDiv.className = 'chunk';
            chunkDiv.style.width = "100%"; // Đảm bảo chiếm hết chiều ngang

            const start = currentChunkIndex * CHUNK_SIZE;
            const end = start + CHUNK_SIZE;
            const chunkData = allUrls.slice(start, end);

            chunkData.forEach(url => {
                const container = document.createElement('div');
                container.className = 'img-container';
                
                const img = document.createElement('img');
                img.loading = "lazy";
                img.referrerPolicy = "no-referrer";
                img.src = url;

                // --- XỬ LÝ LỖI Ở ĐÂY ---
                img.onerror = function() {
                    console.warn("Lỗi tải ảnh, đang xóa:", url);
                    container.remove(); // Xóa cả container chứa ảnh để không bị trống layout
                };
                // -----------------------

                container.appendChild(img);
                chunkDiv.appendChild(container);
            });

            gallery.appendChild(chunkDiv);
            loadedChunks.push(chunkDiv);
            currentChunkIndex++;

            if (loadedChunks.length > MAX_CHUNKS_IN_DOM) {
                const removedChunk = loadedChunks.shift();
                removedChunk.remove();
            }
        }

        // 4. Kiểm tra khi nào gần cuối trang để load tiếp
        function handleScroll() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
                // Nếu đang ở chunk thứ 3 của danh sách hiện tại, nạp thêm
                loadNextChunk();
            }
        }

        init();
    </script>
</body>
</html>
